name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # For trusted publishing to PyPI

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - platform: "Linux x86_64"
            os: ubuntu-22.04
            arch: x86_64

          # Linux ARM64 (native runner)
          - platform: "Linux ARM64"
            os: ubuntu-24.04-arm
            arch: aarch64

          # macOS Intel
          - platform: "macOS Intel"
            os: macos-15-intel
            arch: x86_64

          # macOS Apple Silicon
          - platform: "macOS ARM64"
            os: macos-15
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select --install 2>/dev/null || true

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install build auditwheel

      - name: Build wheel
        run: python -m build --wheel
        timeout-minutes: 15

      - name: Check wheel with auditwheel (Linux only)
        if: runner.os == 'Linux'
        run: |
          # Check if wheel is manylinux compatible
          auditwheel show dist/*.whl || echo "auditwheel check failed, may need repair"

      - name: Repair wheel with auditwheel (Linux only)
        if: runner.os == 'Linux'
        run: |
          # Try to repair the wheel if needed
          # This will bundle any dynamic libraries
          if ! auditwheel show dist/*.whl | grep -q "is consistent"; then
            echo "Repairing wheel with auditwheel..."
            auditwheel repair dist/*.whl -w dist-repaired/
            rm dist/*.whl
            mv dist-repaired/*.whl dist/
          fi
        continue-on-error: true

      - name: List wheel contents
        run: |
          ls -lh dist/
          python -m zipfile -l dist/*.whl | head -30

      - name: Get wheel filename
        id: wheel
        run: |
          WHEEL_NAME=$(basename dist/*.whl)
          echo "name=${WHEEL_NAME}" >> $GITHUB_OUTPUT

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.wheel.outputs.name }}
          path: dist/*.whl
          retention-days: 90

  test-wheels:
    name: Test wheel on ${{ matrix.platform }}
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Test on same platforms we built for
          - platform: "Linux x86_64"
            os: ubuntu-22.04
            arch: x86_64
            python-versions: ["3.10", "3.11", "3.12", "3.13"]

          - platform: "Linux ARM64"
            os: ubuntu-24.04-arm
            arch: aarch64
            python-versions: ["3.10", "3.11", "3.12", "3.13"]

          - platform: "macOS Intel"
            os: macos-15
            arch: x86_64
            python-versions: ["3.10", "3.11", "3.12", "3.13"]

          - platform: "macOS ARM64"
            os: macos-15
            arch: arm64
            python-versions: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code (for test script)
        uses: actions/checkout@v5

      - name: Download wheel
        uses: actions/download-artifact@v6
        with:
          pattern: "*${{ matrix.arch }}*.whl"
          path: dist/
          merge-multiple: true

      - name: Test wheel with Python ${{ join(matrix.python-versions, ', ') }}
        run: |
          for pyver in ${{ join(matrix.python-versions, ' ') }}; do
            echo "========================================"
            echo "Testing with Python $pyver"
            echo "========================================"

            # Set up Python version
            if command -v pyenv &> /dev/null; then
              pyenv install -s $pyver
              pyenv shell $pyver
            fi

            # Create fresh virtualenv
            python$pyver -m venv test-env-$pyver
            source test-env-$pyver/bin/activate

            # Install wheel
            pip install dist/*.whl

            # Run test script
            python test_wheel.py

            # Cleanup
            deactivate
            rm -rf test-env-$pyver

            echo "✓ Python $pyver passed"
            echo ""
          done

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 90

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, test-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: prod # Requires manual approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist-artifacts

      - name: Prepare distribution files
        run: |
          mkdir -p dist
          find dist-artifacts -name "*.whl" -exec cp {} dist/ \;
          find dist-artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          ls -lh dist/
          echo "Total wheels: $(ls dist/*.whl | wc -l)"
          echo "Total files: $(ls dist/ | wc -l)"

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "CHANGELOG<<EOF"
            git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## valkeylite ${{ steps.version.outputs.VERSION }}

            Bundled Valkey version: ${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            pip install valkeylite==${{ steps.version.outputs.VERSION }}
            ```

            ### Changes

            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Platform Support

            - ✅ Linux x86_64 (manylinux_2_28)
            - ✅ Linux aarch64 (manylinux_2_28)
            - ✅ macOS x86_64 (Intel)
            - ✅ macOS arm64 (Apple Silicon)

            ### Python Version Support

            - ✅ Python 3.10
            - ✅ Python 3.11
            - ✅ Python 3.12
            - ✅ Python 3.13

            ### Wheels Included

            - 4 platform-specific wheels (each works with Python 3.10-3.13)
            - 1 source distribution

            Full changelog: https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.VERSION }}
          files: dist/*
          draft: false
          prerelease: false

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: prod # Requires manual approval

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist-artifacts

      - name: Prepare distribution files
        run: |
          mkdir -p dist
          find dist-artifacts -name "*.whl" -exec cp {} dist/ \;
          find dist-artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          ls -lh dist/
          echo "Total wheels: $(ls dist/*.whl | wc -l)"
          echo "Expected: 4 wheels + 1 sdist = 5 files"
          echo "Actual: $(ls dist/ | wc -l) files"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OIDC trusted publishing (configure at https://pypi.org/manage/account/publishing/)
          # Alternatively, use:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
