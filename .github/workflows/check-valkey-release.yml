name: Check Valkey Release

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install requests

      - name: Check for new releases
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_valkey_version.py --github-output $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update to Valkey ${{ steps.check.outputs.valkey_version }}"
          branch: auto-update-valkey-${{ steps.check.outputs.valkey_version }}
          title: "Update to Valkey ${{ steps.check.outputs.valkey_version }}"
          body: ${{ steps.check.outputs.pr_body }}
          labels: |
            dependencies
            automated
          draft: false
