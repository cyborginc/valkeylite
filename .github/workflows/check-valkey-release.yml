name: Check Valkey Release

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install requests

      - name: Check for new Valkey release
        id: check
        run: |
          python - <<'EOF'
          import json
          import os
          import re
          import sys
          from pathlib import Path
          import requests

          # Get latest Valkey release from GitHub
          response = requests.get(
              "https://api.github.com/repos/valkey-io/valkey/releases/latest",
              headers={"Accept": "application/vnd.github.v3+json"}
          )
          response.raise_for_status()
          latest_tag = response.json()["tag_name"]
          latest_version = latest_tag.lstrip("v")

          print(f"Latest Valkey version: {latest_version}")

          # Get current version from pyproject.toml
          pyproject = Path("pyproject.toml").read_text()
          match = re.search(r'version = "([^"]+)"', pyproject)
          current_version = match.group(1)

          print(f"Current version: {current_version}")

          # Check if update is needed
          if latest_version != current_version:
              print(f"Update needed: {current_version} → {latest_version}")

              # Set outputs for GitHub Actions
              with open(Path(os.environ["GITHUB_OUTPUT"]), "a") as f:
                  f.write(f"update_needed=true\n")
                  f.write(f"latest_version={latest_version}\n")
                  f.write(f"current_version={current_version}\n")

              # Update pyproject.toml
              new_content = pyproject.replace(
                  f'version = "{current_version}"',
                  f'version = "{latest_version}"'
              )
              Path("pyproject.toml").write_text(new_content)

              # Update setup.py
              setup_py = Path("setup.py").read_text()
              new_setup = setup_py.replace(
                  f'VALKEY_VERSION = "{current_version}"',
                  f'VALKEY_VERSION = "{latest_version}"'
              )
              Path("setup.py").write_text(new_setup)

              # Update __init__.py
              init_py = Path("src/valkey_server/__init__.py").read_text()
              new_init = init_py.replace(
                  f'__version__ = "{current_version}"',
                  f'__version__ = "{latest_version}"'
              )
              Path("src/valkey_server/__init__.py").write_text(new_init)

          else:
              print("Already up to date")
              with open(Path(os.environ["GITHUB_OUTPUT"]), "a") as f:
                  f.write(f"update_needed=false\n")
          EOF

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Valkey to ${{ steps.check.outputs.latest_version }}"
          branch: auto-update-valkey-${{ steps.check.outputs.latest_version }}
          title: "Update Valkey to ${{ steps.check.outputs.latest_version }}"
          body: |
            ## Automated Valkey Version Update

            This PR updates the bundled Valkey version from **${{ steps.check.outputs.current_version }}** to **${{ steps.check.outputs.latest_version }}**.

            ### Changes
            - Updated version in `pyproject.toml`
            - Updated `VALKEY_VERSION` in `setup.py`
            - Updated `__version__` in `src/valkey_server/__init__.py`

            ### Valkey Release Notes
            https://github.com/valkey-io/valkey/releases/tag/${{ steps.check.outputs.latest_version }}

            ### Testing
            - [ ] PR tests pass (Linux x86_64, Python 3.13)
            - [ ] Review Valkey changelog for breaking changes
            - [ ] Verify wheel builds successfully

            ---
            🤖 This PR was automatically generated by the check-valkey-release workflow.
          labels: |
            dependencies
            automated
          draft: false
